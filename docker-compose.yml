version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: icehorse
      POSTGRES_PASSWORD: icehorse_password
      POSTGRES_DB: icehorsedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8082:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://icehorse:icehorse_password@db:5432/icehorsedb
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://192.168.1.66:8082}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
